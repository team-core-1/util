        - required:
          - cgi
        - required:
          - sai
        - required:
          - rai
        - required:
          - lai
      properties:
        locationNumber:
          type: string
        cgi:
          $ref: '#/components/schemas/CellGlobalId'
        rai:
          $ref: '#/components/schemas/RoutingAreaId'
        sai:
          $ref: '#/components/schemas/ServiceAreaId'
        lai:
          $ref: '#/components/schemas/LocationAreaId'
        vlrNumber:
          type: string
        mscNumber:
          type: string
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: '^[0-9A-F]{16}$'
        geodeticInformation:
          type: string
          pattern: '^[0-9A-F]{20}$'
    CellGlobalId:
      type: object
      required:
        - plmnId
        - lac
        - cellId
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: '^[A-Fa-f0-9]{4}$'
        cellId:
          type: string
          pattern: '^[A-Fa-f0-9]{4}$'
    ServiceAreaId:
      type: object
      required:
        - plmnId
        - lac
        - sac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: '^[A-Fa-f0-9]{4}$'
        sac:
          type: string
          pattern: '^[A-Fa-f0-9]{4}$'
    LocationAreaId:
      type: object
      required:
        - plmnId
        - lac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: '^[A-Fa-f0-9]{4}$'
    RoutingAreaId:
      type: object
      required:
        - plmnId
        - lac
        - rac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: '^[A-Fa-f0-9]{4}$'
        rac:
          type: string
          pattern: '^[A-Fa-f0-9]{2}$'
    DddTrafficDescriptor:
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
        macAddr:
          $ref: '#/components/schemas/MacAddr48'
    MoExpDataCounter:
      type: object
      required:
        - counter
      properties:
        counter:
          type: integer
        timeStamp:
          $ref: '#/components/schemas/DateTime'
    NssaaStatus:
      type: object
      required:
        - snssai
        - status
      properties:
        snssai:
          $ref: '#/components/schemas/Snssai'
        status:
          $ref: '#/components/schemas/AuthStatus'
    NssaaStatusRm:
      anyOf:
        - $ref: '#/components/schemas/NssaaStatus'
        - $ref: '#/components/schemas/NullValue'
    TnapId:
      type: object
      properties:
        ssId:
          type: string
        bssId:
          type: string
        civicAddress:
          $ref: '#/components/schemas/Bytes'
    TnapIdRm:
      anyOf:
        - $ref: '#/components/schemas/TnapId'
        - $ref: '#/components/schemas/NullValue'
    TwapId:
      type: object
      required:
        - ssId
      properties:
        ssId:
          type: string
        bssId:
          type: string
        civicAddress:
          $ref: '#/components/schemas/Bytes'
    TwapIdRm:
      anyOf:
        - $ref: '#/components/schemas/TwapId'
        - $ref: '#/components/schemas/NullValue'
    LineType:
      anyOf:
      - type: string
        enum:
          - DSL
          - PON
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - DSL: Identifies a DSL line
        - PON: Identifies a PON line
    LineTypeRm:
      anyOf:
        - $ref: '#/components/schemas/LineType'
        - $ref: '#/components/schemas/NullValue'

    SnssaiExtension:
      description: Extensions to the Snssai data type, sdRanges and wildcardSd shall not be present simultaneously
      type: object
      not:
        required:
          - sdRanges
          - wildcardSd
      properties:
        sdRanges:
          description: When present, it shall contain the range(s) of Slice Differentiator values supported for the Slice/Service Type value indicated in the sst attribute of the Snssai data type
          type: array
          items:
            $ref: '#/components/schemas/SdRange'
          minItems: 1
        wildcardSd:
          description: When present, it shall be set to true, to indicate that all SD values are supported for the Slice/Service Type value indicated in the sst attribute of the Snssai data type
          type: boolean
          enum:
            - true

    SdRange:
      description: A range of SDs (Slice Differentiators)
      type: object
      properties:
        start:
          type: string
          pattern: '^[A-Fa-f0-9]{6}$'
        end:
          type: string
          pattern: '^[A-Fa-f0-9]{6}$'

#
# Data types describing alternative data types or combinations of data types
#
    ExtSnssai:
      allOf:
        - $ref: '#/components/schemas/Snssai'
        - $ref: '#/components/schemas/SnssaiExtension'

#
# Data Types related to 5G QoS as defined in clause 5.5
#

#
# SIMPLE DATA TYPES
#
#
    Qfi:
      type: integer
      minimum: 0
      maximum: 63
    QfiRm:
      type: integer
      minimum: 0
      maximum: 63
      nullable: true
    5Qi:
      type: integer
      minimum: 0
      maximum: 255
    5QiRm:
      type: integer
      minimum: 0
      maximum: 255
      nullable: true
    BitRate:
      type: string
      pattern: '^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$'
    BitRateRm:
      type: string
      pattern: '^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$'
      nullable: true
    ArpPriorityLevelRm:
      type: integer
      minimum: 1
      maximum: 15
      nullable: true
    ArpPriorityLevel:
      type: integer
      minimum: 1
      maximum: 15
      nullable: true
      description: nullable true shall not be used for this attribute
    5QiPriorityLevel:
      type: integer
      minimum: 1
      maximum: 127
    5QiPriorityLevelRm:
      type: integer
      minimum: 1
      maximum: 127
      nullable: true
    PacketDelBudget:
      type: integer
      minimum: 1
    PacketDelBudgetRm:
      type: integer
      minimum: 1
      nullable: true
    PacketErrRate:
      type: string
      pattern: '^([0-9]E-[0-9])$'
    PacketErrRateRm:
      type: string
      pattern: '^([0-9]E-[0-9])$'
      nullable: true
    PacketLossRate:
      type: integer
      minimum: 0
      maximum: 1000
    PacketLossRateRm:
      type: integer
      minimum: 0
      maximum: 1000
      nullable: true
    AverWindow:
      type: integer
      minimum: 1
      maximum: 4095
      default: 2000
    AverWindowRm:
      type: integer
      maximum: 4095
      default: 2000
      minimum: 1
      nullable: true
    MaxDataBurstVol:
      type: integer
      minimum: 1
      maximum: 4095
    MaxDataBurstVolRm:
      type: integer
      minimum: 1
      maximum: 4095
      nullable: true
    SamplingRatio:
      type: integer
      minimum: 1
      maximum: 100
    SamplingRatioRm:
      type: integer
      minimum: 1
      maximum: 100
      nullable: true
    RgWirelineCharacteristics:
      $ref: '#/components/schemas/Bytes'
    RgWirelineCharacteristicsRm:
      anyOf:
        - $ref: '#/components/schemas/RgWirelineCharacteristics'
        - $ref: '#/components/schemas/NullValue'
    ExtMaxDataBurstVol:
      type: integer
      minimum: 4096
      maximum: 2000000
    ExtMaxDataBurstVolRm:
      type: integer
      minimum: 4096
      maximum: 2000000
      nullable: true
    ExtPacketDelBudget:
      type: integer
      minimum: 1
    ExtPacketDelBudgetRm:
      type: integer
      minimum: 1
      nullable: true

#
# ENUMERATED DATA TYPES
#

    PreemptionCapability:
      anyOf:
        - type: string
          enum:
            - NOT_PREEMPT
            - MAY_PREEMPT
        - type: string
    PreemptionCapabilityRm:
      anyOf:
        - $ref: '#/components/schemas/PreemptionCapability'
        - $ref: '#/components/schemas/NullValue'
    PreemptionVulnerability:
      anyOf:
        - type: string
          enum:
            - NOT_PREEMPTABLE
            - PREEMPTABLE
        - type: string
    PreemptionVulnerabilityRm:
      anyOf:
        - $ref: '#/components/schemas/PreemptionVulnerability'
        - $ref: '#/components/schemas/NullValue'
    ReflectiveQoSAttribute:
      anyOf:
        - type: string
          enum:
            - RQOS
            - NO_RQOS
        - type: string
    ReflectiveQoSAttributeRm:
      anyOf:
        - $ref: '#/components/schemas/ReflectiveQoSAttribute'
        - $ref: '#/components/schemas/NullValue'
    NotificationControl:
      anyOf:
        - type: string
          enum:
            - REQUESTED
            - NOT_REQUESTED
        - type: string
    NotificationControlRm:
      anyOf:
        - $ref: '#/components/schemas/NotificationControl'
        - $ref: '#/components/schemas/NullValue'
    QosResourceType:
      anyOf:
        - type: string
          enum:
            - NON_GBR
            - NON_CRITICAL_GBR
            - CRITICAL_GBR
        - type: string
    QosResourceTypeRm:
      anyOf:
        - $ref: '#/components/schemas/QosResourceType'
        - $ref: '#/components/schemas/NullValue'
    AdditionalQosFlowInfo:
      anyOf:
        - anyOf:
            - type: string
              enum:
                - MORE_LIKELY
            - type: string
        - $ref: '#/components/schemas/NullValue'
#

#
# STRUCTURED DATA TYPES
#

    Arp:
      type: object
      properties:
        priorityLevel:
          $ref: '#/components/schemas/ArpPriorityLevel'
        preemptCap:
          $ref: '#/components/schemas/PreemptionCapability'
        preemptVuln:
          $ref: '#/components/schemas/PreemptionVulnerability'
      required:
        - priorityLevel
        - preemptCap
        - preemptVuln
    ArpRm:
      anyOf:
        - $ref: '#/components/schemas/Arp'
        - $ref: '#/components/schemas/NullValue'
    Ambr:
      type: object
      properties:
        uplink:
          $ref: '#/components/schemas/BitRate'
        downlink:
          $ref: '#/components/schemas/BitRate'
      required:
        - uplink
        - downlink
    AmbrRm:
      anyOf:
        - $ref: '#/components/schemas/Ambr'
        - $ref: '#/components/schemas/NullValue'
    Dynamic5Qi:
      type: object
      properties:
        resourceType:
          $ref: '#/components/schemas/QosResourceType'
        priorityLevel:
          $ref: '#/components/schemas/5QiPriorityLevel'
        packetDelayBudget:
          $ref: '#/components/schemas/PacketDelBudget'
        packetErrRate:
          $ref: '#/components/schemas/PacketErrRate'
        averWindow:
          $ref: '#/components/schemas/AverWindow'
        maxDataBurstVol:
          $ref: '#/components/schemas/MaxDataBurstVol'
        extMaxDataBurstVol:
          $ref: '#/components/schemas/ExtMaxDataBurstVol'
        extPacketDelBudget:
          $ref: '#/components/schemas/ExtPacketDelBudget'
        cnPacketDelayBudgetDl:
          $ref: '#/components/schemas/ExtPacketDelBudget'
        cnPacketDelayBudgetUl:
          $ref: '#/components/schemas/ExtPacketDelBudget'
      required:
        - resourceType
        - priorityLevel
        - packetDelayBudget
        - packetErrRate
    NonDynamic5Qi:
      type: object
      properties:
        priorityLevel:
          $ref: '#/components/schemas/5QiPriorityLevel'
        averWindow:
          $ref: '#/components/schemas/AverWindow'
        maxDataBurstVol:
          $ref: '#/components/schemas/MaxDataBurstVol'
        extMaxDataBurstVol:
          $ref: '#/components/schemas/ExtMaxDataBurstVol'
        cnPacketDelayBudgetDl:
          $ref: '#/components/schemas/ExtPacketDelBudget'
        cnPacketDelayBudgetUl:
          $ref: '#/components/schemas/ExtPacketDelBudget'
      minProperties: 0

#
# Data Types related to 5G Trace as defined in clause 5.6
#

#
# SIMPLE DATA TYPES
#
    PhysCellId:
      type: integer
      minimum: 0
      maximum: 1007
    ArfcnValueNR:
      type: integer
      minimum: 0
      maximum: 3279165
#
#
# Enumerations
#
    TraceDepth:
      anyOf:
        - type: string
          enum:
            - MINIMUM
            - MEDIUM
            - MAXIMUM
            - MINIMUM_WO_VENDOR_EXTENSION
            - MEDIUM_WO_VENDOR_EXTENSION
            - MAXIMUM_WO_VENDOR_EXTENSION
        - type: string
    TraceDepthRm:
      anyOf:
        - $ref: '#/components/schemas/TraceDepth'
        - $ref: '#/components/schemas/NullValue'
    JobType:
      anyOf:
        - type: string
          enum:
            - IMMEDIATE_MDT_ONLY
            - LOGGED_MDT_ONLY
            - TRACE_ONLY
            - IMMEDIATE_MDT_AND_TRACE
            - RLF_REPORTS_ONLY
            - RCEF_REPORTS_ONLY
            - LOGGED_MBSFN_MDT
        - type: string
    ReportTypeMdt:
      anyOf:
        - type: string
          enum:
            - PERIODICAL
            - EVENT_TRIGGED
        - type: string
    MeasurementLteForMdt:
      anyOf:
        - type: string
          enum:
            - M1
            - M2
            - M3
            - M4_DL
            - M4_UL
            - M5_DL
            - M5_UL
            - M6_DL
            - M6_UL
            - M7_DL
            - M7_UL
            - M8
            - M9
        - type: string
    MeasurementNrForMdt:
      anyOf:
        - type: string
          enum:
            - M1
            - M2
            - M3
            - M4_DL
            - M4_UL
            - M5_DL
            - M5_UL
            - M6_DL
            - M6_UL
            - M7_DL
            - M7_UL
            - M8
            - M9
        - type: string
    SensorMeasurement:
      anyOf:
        - type: string
          enum:
            - BAROMETRIC_PRESSURE
            - UE_SPEED
            - UE_ORIENTATION
        - type: string
    ReportingTrigger:
      anyOf:
        - type: string
          enum:
            - PERIODICAL
            - EVENT_A2
            - EVENT_A2_PERIODIC
            - ALL_RRM_EVENT_TRIGGERS
        - type: string
    ReportIntervalMdt:
      anyOf:
        - type: string
          enum:
            - 120
            - 240
            - 480
            - 640
            - 1024
            - 2048
            - 5120
            - 10240
            - 60000
            - 360000
            - 720000
            - 1800000
            - 3600000
        - type: string
    ReportAmountMdt:
      anyOf:
        - type: string
          enum:
            - 1
            - 2
            - 4
            - 8
            - 16
            - 32
            - 64
            - infinity
        - type: string
    EventForMdt:
      anyOf:
        - type: string
          enum:
            - OUT_OF_COVERAG
            - A2_EVENT
        - type: string
    LoggingIntervalMdt:
      anyOf:
        - type: string
          enum:
            - 128
            - 256
            - 512
            - 1024
            - 2048
            - 3072
            - 4096
            - 6144
        - type: string
    LoggingDurationMdt:
      anyOf:
        - type: string
          enum:
            - 600
            - 1200
            - 2400
            - 3600
            - 5400
            - 7200
        - type: string
    PositioningMethodMdt:
      anyOf:
        - type: string
          enum:
            - GNSS
            - E_CELL_ID
        - type: string
    CollectionPeriodRmmLteMdt:
      anyOf:
        - type: string
          enum:
            - 1024
            - 1280
            - 2048
            - 2560
            - 5120
            - 10240
            - 60000
        - type: string
    MeasurementPeriodLteMdt:
      anyOf:
        - type: string
          enum:
            - 1024
            - 1280
            - 2048
            - 2560
            - 5120
            - 10240
            - 60000
        - type: string

    ReportIntervalNrMdt:
      anyOf:
        - type: string
          enum:
            - 120
            - 240
            - 480
            - 640
            - 1024
            - 2048
            - 5120
            - 10240
            - 20480
            - 40960
            - 60000
            - 360000
            - 720000
            - 1800000
            - 3600000
        - type: string

    LoggingIntervalNrMdt:
      anyOf:
        - type: string
          enum:
            - 128
            - 256
            - 512
            - 1024
            - 2048
            - 3072
            - 4096
            - 6144
            - 320
            - 640
            - infinity
        - type: string

    CollectionPeriodRmmNrMdt:
      anyOf:
        - type: string
          enum:
            - 1024
            - 2048
            - 5120
            - 10240
            - 60000
        - type: string

    LoggingDurationNrMdt:
      anyOf:
        - type: string
          enum:
            - 600
            - 1200
            - 2400
            - 3600
            - 5400
            - 7200
        - type: string
#
# STRUCTURED DATA TYPES
#
    TraceData:
      type: object
      nullable: true
      properties:
        traceRef:
          type: string
          pattern: '^[0-9]{3}[0-9]{2,3}-[A-Fa-f0-9]{6}$'
        traceDepth:
          $ref: '#/components/schemas/TraceDepth'
        neTypeList:
          type: string
          pattern: '^[A-Fa-f0-9]+$'
        eventList:
          type: string
          pattern: '^[A-Fa-f0-9]+$'
        collectionEntityIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        collectionEntityIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        interfaceList:
          type: string
          pattern: '^[A-Fa-f0-9]+$'
      required:
        - traceRef
        - traceDepth
        - neTypeList
        - eventList
    MdtConfiguration:
      type: object
      required:
        - jobType
      properties:
        jobType:
          $ref: '#/components/schemas/JobType'
        reportType:
          $ref: '#/components/schemas/ReportTypeMdt'
        areaScope:
          $ref: '#/components/schemas/AreaScope'
        measurementLteList:
          type: array
          items:
            $ref: '#/components/schemas/MeasurementLteForMdt'
        measurementNrList:
          type: array
          items:
            $ref: '#/components/schemas/MeasurementNrForMdt'
          minItems: 1
        sensorMeasurementList:
          type: array
          items:
            $ref: '#/components/schemas/SensorMeasurement'
          minItems: 1
        reportingTriggerList:
          type: array
          items:
            $ref: '#/components/schemas/ReportingTrigger'
          minItems: 1
        reportInterval:
          $ref: '#/components/schemas/ReportIntervalMdt'
        reportIntervalNr:
          $ref: '#/components/schemas/ReportIntervalNrMdt'
        reportAmount:
          $ref: '#/components/schemas/ReportAmountMdt'
        eventThresholdRsrp:
          type: integer
          minimum: 0
          maximum: 97
        eventThresholdRsrpNr:
          type: integer
          minimum: 0
          maximum: 127
        eventThresholdRsrq:
          type: integer
          minimum: 0
          maximum: 34
        eventThresholdRsrqNr:
          type: integer
          minimum: 0
          maximum: 127
        eventList:
          type: array
          items:
            $ref: '#/components/schemas/EventForMdt'
          minItems: 1
        loggingInterval:
          $ref: '#/components/schemas/LoggingIntervalMdt'
        loggingIntervalNr:
          $ref: '#/components/schemas/LoggingIntervalNrMdt'
        loggingDuration:
          $ref: '#/components/schemas/LoggingDurationMdt'
        loggingDurationNr:
          $ref: '#/components/schemas/LoggingDurationNrMdt'
        positioningMethod:
          $ref: '#/components/schemas/PositioningMethodMdt'
        addPositioningMethodList:
          type: array
          items:
            $ref: '#/components/schemas/PositioningMethodMdt'
          minItems: 1
        collectionPeriodRmmLte:
          $ref: '#/components/schemas/CollectionPeriodRmmLteMdt'
        collectionPeriodRmmNr:
          $ref: '#/components/schemas/CollectionPeriodRmmNrMdt'
        measurementPeriodLte:
          $ref: '#/components/schemas/MeasurementPeriodLteMdt'
        mdtAllowedPlmnIdList:
          type: array
          items:
            $ref: '#/components/schemas/PlmnId'
          minItems: 1
          maxItems: 16
        mbsfnAreaList:
          type: array
          items:
            $ref: '#/components/schemas/MbsfnArea'
          minItems: 1
          maxItems: 8
        interFreqTargetList:
          type: array
          items:
            $ref: '#/components/schemas/InterFreqTargetInfo'
          minItems: 1
          maxItems: 8
    AreaScope:
      type: object
      properties:
        eutraCellIdList:
          type: array
          items:
            $ref: '#/components/schemas/EutraCellId'
          minItems: 1
        nrCellIdList:
          type: array
          items:
            $ref: '#/components/schemas/NrCellId'
          minItems: 1
        tacList:
          type: array
          items:
            $ref: '#/components/schemas/Tac'
          minItems: 1
        tacInfoPerPlmn:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TacInfo'
    TacInfo:
      type: object
      required:
        - tacList
      properties:
        tacList:
          type: array
          items:
            $ref: '#/components/schemas/Tac'
          minItems: 1
    MbsfnArea:
      type: object
      properties:
        mbsfnAreaId:
          type: integer
          minimum: 0
          maximum: 255
        carrierFrequency:
          type: integer
          minimum: 0
          maximum: 262143

    InterFreqTargetInfo:
      required:
        - dlCarrierFreq
      type: object
      properties:
        dlCarrierFreq:
          $ref: '#/components/schemas/ArfcnValueNR'
        cellIdList:
          type: array
          items:
            $ref: '#/components/schemas/PhysCellId'
          minItems: 1
          maxItems: 32


# Data Types related to 5G ODB as defined in clause 5.7

#
# SIMPLE DATA TYPES
#
#
#
# Enumerations
#
    RoamingOdb:
      anyOf:
        - type: string
          enum:
            - OUTSIDE_HOME_PLMN
            - OUTSIDE_HOME_PLMN_COUNTRY
        - type: string

    OdbPacketServices:
      anyOf:
        - anyOf:
            - type: string
              enum:
                - ALL_PACKET_SERVICES
                - ROAMER_ACCESS_HPLMN_AP
                - ROAMER_ACCESS_VPLMN_AP
            - type: string
        - $ref: '#/components/schemas/NullValue'

#
# STRUCTURED DATA TYPES
#

    OdbData:
      type: object
      properties:
        roamingOdb:
          $ref: '#/components/schemas/RoamingOdb'

#
# Data Types related to Charging as defined in clause 5.8
#

#
# SIMPLE DATA TYPES
#
#
    ChargingId:
      $ref: '#/components/schemas/Uint32'

    ApplicationChargingId:
      type: string

    RatingGroup:
      $ref: '#/components/schemas/Uint32'

    ServiceId:
      $ref: '#/components/schemas/Uint32'


#
# Enumerations
#

#
# STRUCTURED DATA TYPES
#
    SecondaryRatUsageReport:
      type: object
      properties:
        secondaryRatType:
          $ref: '#/components/schemas/RatType'
        qosFlowsUsageData:
          type: array
          items:
            $ref: '#/components/schemas/QosFlowUsageReport'
          minItems: 1
      required:
        - secondaryRatType
        - qosFlowsUsageData

    QosFlowUsageReport:
      type: object
      properties:
        qfi:
          $ref: '#/components/schemas/Qfi'
        startTimeStamp:
          $ref: '#/components/schemas/DateTime'
        endTimeStamp:
          $ref: '#/components/schemas/DateTime'
        downlinkVolume:
          $ref: '#/components/schemas/Int64'
        uplinkVolume:
          $ref: '#/components/schemas/Int64'
      required:
        - qfi
        - startTimeStamp
        - endTimeStamp
        - downlinkVolume
        - uplinkVolume

    SecondaryRatUsageInfo:
      type: object
      properties:
        secondaryRatType:
          $ref: '#/components/schemas/RatType'
        qosFlowsUsageData:
          type: array
          items:
            $ref: '#/components/schemas/QosFlowUsageReport'
          minItems: 1
        pduSessionUsageData:
          type: array
          items:
            $ref: '#/components/schemas/VolumeTimedReport'
          minItems: 1
      required:
        - secondaryRatType

    VolumeTimedReport:
      type: object
      properties:
        startTimeStamp:
          $ref: '#/components/schemas/DateTime'
        endTimeStamp:
          $ref: '#/components/schemas/DateTime'
        downlinkVolume:
          $ref: '#/components/schemas/Int64'
        uplinkVolume:
          $ref: '#/components/schemas/Int64'
      required:
        - startTimeStamp
        - endTimeStamp
        - downlinkVolume
        - uplinkVolume


