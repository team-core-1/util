    TypeAllocationCode:
      type: string
      pattern: '^[0-9]{8}$'
    HfcNId:
      type: string
      maxLength: 6
    HfcNIdRm:
      type: string
      maxLength: 6
      nullable: true
    ENbId:
      type: string
      pattern: '^(MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5}|HomeeNB-[A-Fa-f0-9]{7})$'
    Gli:
      $ref: '#/components/schemas/Bytes'
    Gci:
      type: string

#
# ENUMERATED DATA TYPES
#

    AccessType:
      type: string
      enum:
        - 3GPP_ACCESS
        - NON_3GPP_ACCESS
    AccessTypeRm:
      anyOf:
        - $ref: '#/components/schemas/AccessType'
        - $ref: '#/components/schemas/NullValue'
    RatType:
      anyOf:
        - type: string
          enum:
            - NR
            - EUTRA
            - WLAN
            - VIRTUAL
            - NBIOT
            - WIRELINE
            - WIRELINE_CABLE
            - WIRELINE_BBF
            - LTE-M
            - NR_U
            - EUTRA_U
            - TRUSTED_N3GA
            - TRUSTED_WLAN
            - UTRA
            - GERA
        - type: string
    RatTypeRm:
      anyOf:
        - $ref: '#/components/schemas/RatType'
        - $ref: '#/components/schemas/NullValue'
    PduSessionType:
      anyOf:
        - type: string
          enum:
            - IPV4
            - IPV6
            - IPV4V6
            - UNSTRUCTURED
            - ETHERNET
        - type: string
    PduSessionTypeRm:
      anyOf:
        - $ref: '#/components/schemas/PduSessionType'
        - $ref: '#/components/schemas/NullValue'
    UpIntegrity:
      anyOf:
        - type: string
          enum:
            - REQUIRED
            - PREFERRED
            - NOT_NEEDED
        - type: string
    UpIntegrityRm:
      anyOf:
        - $ref: '#/components/schemas/UpIntegrity'
        - $ref: '#/components/schemas/NullValue'
    UpConfidentiality:
      anyOf:
        - type: string
          enum:
            - REQUIRED
            - PREFERRED
            - NOT_NEEDED
        - type: string
    UpConfidentialityRm:
      anyOf:
        - $ref: '#/components/schemas/UpConfidentiality'
        - $ref: '#/components/schemas/NullValue'
    SscMode:
      anyOf:
        - type: string
          enum:
            - SSC_MODE_1
            - SSC_MODE_2
            - SSC_MODE_3
        - type: string
    SscModeRm:
      anyOf:
        - $ref: '#/components/schemas/SscMode'
        - $ref: '#/components/schemas/NullValue'
    DnaiChangeType:
      anyOf:
      - type: string
        enum:
          - EARLY
          - EARLY_LATE
          - LATE
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - EARLY: Early notification of UP path reconfiguration.
        - EARLY_LATE: Early and late notification of UP path reconfiguration. This value shall only be present in the subscription to the DNAI change event.
        - LATE: Late notification of UP path reconfiguration.
    DnaiChangeTypeRm:
      anyOf:
        - $ref: '#/components/schemas/DnaiChangeType'
        - $ref: '#/components/schemas/NullValue'
    RestrictionType:
      anyOf:
        - type: string
          enum:
            - ALLOWED_AREAS
            - NOT_ALLOWED_AREAS
        - type: string
    RestrictionTypeRm:
      anyOf:
        - $ref: '#/components/schemas/RestrictionType'
        - $ref: '#/components/schemas/NullValue'
    CoreNetworkType:
      anyOf:
        - type: string
          enum:
            - 5GC
            - EPC
        - type: string
    CoreNetworkTypeRm:
      anyOf:
        - $ref: '#/components/schemas/CoreNetworkType'
        - $ref: '#/components/schemas/NullValue'
    PresenceState:
      anyOf:
        - type: string
          enum:
            - IN_AREA
            - OUT_OF_AREA
            - UNKNOWN
            - INACTIVE
        - type: string
    StationaryIndication:
      anyOf:
      - type: string
        enum:
          - STATIONARY
          - MOBILE
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - STATIONARY: Identifies the UE is stationary
        - MOBILE: Identifies the UE is mobile
    StationaryIndicationRm:
      anyOf:
        - $ref: '#/components/schemas/StationaryIndication'
        - $ref: '#/components/schemas/NullValue'
    ScheduledCommunicationType:
      anyOf:
        - type: string
          enum:
            - DOWNLINK_ONLY
            - UPLINK_ONLY
            - BIDIRECTIONAL
        - type: string
    ScheduledCommunicationTypeRm:
      anyOf:
        - $ref: '#/components/schemas/ScheduledCommunicationType'
        - $ref: '#/components/schemas/NullValue'
    TrafficProfile:
      anyOf:
      - type: string
        enum:
          - SINGLE_TRANS_UL
          - SINGLE_TRANS_DL
          - DUAL_TRANS_UL_FIRST
          - DUAL_TRANS_DL_FIRST
          - MULTI_TRANS
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - SINGLE_TRANS_UL: Uplink single packet transmission.
        - SINGLE_TRANS_DL: Downlink single packet transmission.
        - DUAL_TRANS_UL_FIRST: Dual packet transmission, firstly uplink packet transmission with subsequent downlink packet transmission.
        - DUAL_TRANS_DL_FIRST: Dual packet transmission, firstly downlink packet transmission with subsequent uplink packet transmission.
    TrafficProfileRm:
      anyOf:
        - $ref: '#/components/schemas/TrafficProfile'
        - $ref: '#/components/schemas/NullValue'
    LcsServiceAuth:
      anyOf:
      - type: string
        enum:
          - "LOCATION_ALLOWED_WITH_NOTIFICATION"
          - "LOCATION_ALLOWED_WITHOUT_NOTIFICATION"
          - "LOCATION_ALLOWED_WITHOUT_RESPONSE"
          - "LOCATION_RESTRICTED_WITHOUT_RESPONSE"
          - "NOTIFICATION_ONLY"
          - "NOTIFICATION_AND_VERIFICATION_ONLY"
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - "LOCATION_ALLOWED_WITH_NOTIFICATION": Location allowed with notification
        - "LOCATION_ALLOWED_WITHOUT_NOTIFICATION": Location allowed without notification
        - "LOCATION_ALLOWED_WITHOUT_RESPONSE": Location with notification and privacy verification; location allowed if no response
        - "LOCATION_RESTRICTED_WITHOUT_RESPONSE": Location with notification and privacy verification; location restricted if no response
        - "NOTIFICATION_ONLY": Notification only
        - "NOTIFICATION_AND_VERIFICATION_ONLY": Notification and privacy verification only
    UeAuth:
      anyOf:
        - type: string
          enum:
            - AUTHORIZED
            - NOT_AUTHORIZED
        - type: string
    DlDataDeliveryStatus:
      anyOf:
      - type: string
        enum:
          - BUFFERED
          - TRANSMITTED
          - DISCARDED
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - BUFFERED: The first downlink data is buffered with extended buffering matching the source of the downlink traffic.
        - TRANSMITTED: The first downlink data matching the source of the downlink traffic is transmitted after previous buffering or discarding of corresponding packet(s) because the UE of the PDU Session becomes ACTIVE, and buffered data can be delivered to UE.
        - DISCARDED: The first downlink data matching the source of the downlink traffic is discarded because the Extended Buffering time, as determined by the SMF, expires or the amount of downlink data to be buffered is exceeded.
    DlDataDeliveryStatusRm:
      anyOf:
        - $ref: '#/components/schemas/DlDataDeliveryStatus'
        - $ref: '#/components/schemas/NullValue'
    AuthStatus:
      anyOf:
      - type: string
        enum:
          - EAP_SUCCESS
          - EAP_FAILURE
          - PENDING
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - "EAP_SUCCESS": The NSSAA status is EAP-Success.
        - "EAP_FAILURE": The NSSAA status is EAP-Failure.
        - "PENDING": The NSSAA status is Pending.
    TransportProtocol:
      anyOf:
      - type: string
        enum:
          - UDP
          - TCP
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - UDP: User Datagram Protocol.
        - TCP: Transmission Control Protocol.

#
# STRUCTURED DATA TYPES
#

    Snssai:
      type: object
      properties:
        sst:
          type: integer
          minimum: 0
          maximum: 255
        sd:
          type: string
          pattern: '^[A-Fa-f0-9]{6}$'
      required:
        - sst

    PlmnId:
      type: object
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
      required:
        - mcc
        - mnc
    PlmnIdRm:
      anyOf:
        - $ref: '#/components/schemas/PlmnId'
        - $ref: '#/components/schemas/NullValue'
    Tai:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        tac:
          $ref: '#/components/schemas/Tac'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
        - plmnId
        - tac
    TaiRm:
      anyOf:
        - $ref: '#/components/schemas/Tai'
        - $ref: '#/components/schemas/NullValue'
    Ecgi:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
          # PLMN Identity
        eutraCellId:
          $ref: '#/components/schemas/EutraCellId'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
        - plmnId
        - eutraCellId
    EcgiRm:
      anyOf:
        - $ref: '#/components/schemas/Ecgi'
        - $ref: '#/components/schemas/NullValue'
    Ncgi:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        nrCellId:
          $ref: '#/components/schemas/NrCellId'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
        - plmnId
        - nrCellId
    NcgiRm:
      anyOf:
        - $ref: '#/components/schemas/Ncgi'
        - $ref: '#/components/schemas/NullValue'
    UserLocation:
      type: object
      properties:
        eutraLocation:
          $ref: '#/components/schemas/EutraLocation'
        nrLocation:
          $ref: '#/components/schemas/NrLocation'
        n3gaLocation:
          $ref: '#/components/schemas/N3gaLocation'
        utraLocation:
          $ref: '#/components/schemas/UtraLocation'
        geraLocation:
          $ref: '#/components/schemas/GeraLocation'
    EutraLocation:
      type: object
      properties:
        tai:
          $ref: '#/components/schemas/Tai'
        ignoreTai:
          type: boolean
          default: false
        ecgi:
          $ref: '#/components/schemas/Ecgi'
        ignoreEcgi:
          type: boolean
          default: false
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: '^[0-9A-F]{16}$'
        geodeticInformation:
          type: string
          pattern: '^[0-9A-F]{20}$'
        globalNgenbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        globalENbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
      required:
        - tai
        - ecgi
    EutraLocationRm:
      anyOf:
        - $ref: '#/components/schemas/EutraLocation'
        - $ref: '#/components/schemas/NullValue'
    NrLocation:
      type: object
      properties:
        tai:
          $ref: '#/components/schemas/Tai'
        ncgi:
          $ref: '#/components/schemas/Ncgi'
        ignoreNcgi:
          type: boolean
          default: false
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: '^[0-9A-F]{16}$'
        geodeticInformation:
          type: string
          pattern: '^[0-9A-F]{20}$'
        globalGnbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
      required:
        - tai
        - ncgi
    NrLocationRm:
     anyOf:
        - $ref: '#/components/schemas/NrLocation'
        - $ref: '#/components/schemas/NullValue'
    N3gaLocation:
      type: object
      properties:
        n3gppTai:
          $ref: '#/components/schemas/Tai'
        n3IwfId:
          type: string
          pattern: '^[A-Fa-f0-9]+$'
        ueIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ueIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
        tnapId:
          $ref: '#/components/schemas/TnapId'
        protocol:
          $ref: '#/components/schemas/TransportProtocol'
        twapId:
          $ref: '#/components/schemas/TwapId'
        hfcNodeId:
          $ref: '#/components/schemas/HfcNodeId'
        gli:
          $ref: '#/components/schemas/Gli'
        w5gbanLineType:
          $ref: '#/components/schemas/LineType'
        gci:
          $ref: '#/components/schemas/Gci'
    UpSecurity:
      type: object
      properties:
        upIntegr:
          $ref: '#/components/schemas/UpIntegrity'
        upConfid:
          $ref: '#/components/schemas/UpConfidentiality'
      required:
        - upIntegr
        - upConfid
    UpSecurityRm:
     anyOf:
        - $ref: '#/components/schemas/UpSecurity'
        - $ref: '#/components/schemas/NullValue'
    NgApCause:
      type: object
      properties:
        group:
          $ref: '#/components/schemas/Uinteger'
        value:
          $ref: '#/components/schemas/Uinteger'
      required:
        - group
        - value
    BackupAmfInfo:
      type: object
      properties:
        backupAmf:
          $ref: '#/components/schemas/AmfName'
        guamiList:
          type: array
          items:
            $ref: '#/components/schemas/Guami'
          minItems: 1
      required:
        - backupAmf
    RefToBinaryData:
      type: object
      properties:
        contentId:
          type: string
      required:
        - contentId
    RefToBinaryDataRm:
     anyOf:
        - $ref: '#/components/schemas/RefToBinaryData'
        - $ref: '#/components/schemas/NullValue'
    RouteToLocation:
      type: object
      properties:
        dnai:
          $ref: '#/components/schemas/Dnai'
        routeInfo:
          $ref: '#/components/schemas/RouteInformation'
        routeProfId:
          type: string
          nullable: true
      required:
        - dnai
      anyOf:
        - required: [ routeInfo ]
        - required: [ routeProfId ]
      nullable: true
    RouteInformation:
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
      required:
        - portNumber
      nullable: true
    SubscribedDefaultQos:
      type: object
      required:
        - 5qi
        - arp
      properties:
        5qi:
          $ref: '#/components/schemas/5Qi'
        arp:
          $ref: '#/components/schemas/Arp'
        priorityLevel:
          $ref: '#/components/schemas/5QiPriorityLevel'
    Area:
      type: object
      oneOf:
        - required:
          - tacs
        - required:
          - areaCode
      properties:
        tacs:
          type: array
          items:
            $ref: '#/components/schemas/Tac'
          minItems: 1
        areaCode:
            $ref: '#/components/schemas/AreaCode'
    ServiceAreaRestriction:
      type: object
      properties:
        restrictionType:
          $ref: '#/components/schemas/RestrictionType'
        areas:
          type: array
          items:
            $ref: '#/components/schemas/Area'
        maxNumOfTAs:
          $ref: '#/components/schemas/Uinteger'
        maxNumOfTAsForNotAllowedAreas:
          $ref: '#/components/schemas/Uinteger'
      allOf:
        #
        # 1st condition: restrictionType and areas attributes shall be either both absent
        #                or both present
        #
        - oneOf:
            - not:
                required: [ restrictionType ]
            - required: [ areas ]
        #
        # 2nd condition: if restrictionType takes value NOT_ALLOWED_AREAS,
        #                then maxNumOfTAs shall be absent
        #
        - anyOf:
            - not:
                required: [ restrictionType ]
                properties:
                  restrictionType:
                    type: string
                    enum: [ NOT_ALLOWED_AREAS ]
            - not:
                required: [ maxNumOfTAs ]
        #
        # 3rd condition: if restrictionType takes value ALLOWED_AREAS,
        #                then maxNumOfTAsForNotAllowedAreas shall be absent
        #
        - anyOf:
            - not:
                required: [ restrictionType ]
                properties:
                  restrictionType:
                    type: string
                    enum: [ ALLOWED_AREAS ]
            - not:
                required: [ maxNumOfTAsForNotAllowedAreas ]
    WirelineArea:
      type: object
      properties:
        globalLineIds:
          type: array
          items:
            $ref: '#/components/schemas/Gli'
          minItems: 1
        hfcNIds:
          type: array
          items:
            $ref: '#/components/schemas/HfcNId'
          minItems: 1
        areaCodeB:
          $ref: '#/components/schemas/AreaCode'
        areaCodeC:
          $ref: '#/components/schemas/AreaCode'
    WirelineServiceAreaRestriction:
      type: object
      properties:
        restrictionType:
          $ref: '#/components/schemas/RestrictionType'
        areas:
          type: array
          items:
            $ref: '#/components/schemas/WirelineArea'
    PresenceInfo:
      type: object
      properties:
        praId:
          type: string
        additionalPraId:
          type: string
        presenceState:
          $ref: '#/components/schemas/PresenceState'
        trackingAreaList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
        ecgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ecgi'
          minItems: 1
        ncgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ncgi'
          minItems: 1
        globalRanNodeIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
        globaleNbIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
    PresenceInfoRm:
      type: object
      properties:
        praId:
          type: string
        additionalPraId:
          type: string
        presenceState:
          $ref: '#/components/schemas/PresenceState'
        trackingAreaList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 0
        ecgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ecgi'
          minItems: 0
        ncgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ncgi'
          minItems: 0
        globalRanNodeIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
        globaleNbIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
      nullable: true
    GlobalRanNodeId:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        n3IwfId:
          $ref: '#/components/schemas/N3IwfId'
        gNbId:
          $ref: '#/components/schemas/GNbId'
        ngeNbId:
          $ref: '#/components/schemas/NgeNbId'
        wagfId:
          $ref: '#/components/schemas/WAgfId'
        tngfId:
          $ref: '#/components/schemas/TngfId'
        nid:
          $ref: '#/components/schemas/Nid'
        eNbId:
          $ref: '#/components/schemas/ENbId'
      oneOf:
        - required: [ n3IwfId ]
        - required: [ gNbId ]
        - required: [ ngeNbId ]
        - required: [ wagfId ]
        - required: [ tngfId ]
        - required: [ eNbId ]
      required:
        - plmnId
    GNbId:
      type: object
      properties:
        bitLength:
          type: integer
          minimum: 22
          maximum: 32
        gNBValue:
          type: string
          pattern: '^[A-Fa-f0-9]{6,8}$'
      required:
        - bitLength
        - gNBValue
    AtsssCapability:
      type: object
      properties:
        atsssLL:
          type: boolean
          default: false
        mptcp:
          type: boolean
          default: false
        rttWithoutPmf:
          type: boolean
          default: false
    PlmnIdNid:
      type: object
      required:
        - mcc
        - mnc
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
        nid:
          $ref: '#/components/schemas/Nid'
    SmallDataRateStatus:
      type: object
      properties:
        remainPacketsUl:
          type: integer
          minimum: 0
        remainPacketsDl:
          type: integer
          minimum: 0
        validityTime:
          $ref: '#/components/schemas/DateTime'
        remainExReportsUl:
          type: integer
          minimum: 0
        remainExReportsDl:
          type: integer
          minimum: 0
    ApnRateStatus:
      type: object
      properties:
        remainPacketsUl:
          type: integer
          minimum: 0
        remainPacketsDl:
          type: integer
          minimum: 0
        validityTime:
          $ref: '#/components/schemas/DateTime'
        remainExReportsUl:
          type: integer
          minimum: 0
        remainExReportsDl:
          type: integer
          minimum: 0
    HfcNodeId:
      type: object
      required:
        - hfcNId
      properties:
        hfcNId:
          $ref: '#/components/schemas/HfcNId'
    HfcNodeIdRm:
     anyOf:
        - $ref: '#/components/schemas/HfcNodeId'
        - $ref: '#/components/schemas/NullValue'
    ScheduledCommunicationTime:
      type: object
      properties:
        daysOfWeek:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeek'
          minItems: 1
          maxItems: 6
          description: Identifies the day(s) of the week. If absent, it indicates every day of the week.
        timeOfDayStart:
          $ref: '#/components/schemas/TimeOfDay'
        timeOfDayEnd:
          $ref: '#/components/schemas/TimeOfDay'
    ScheduledCommunicationTimeRm:
      anyOf:
        - $ref: '#/components/schemas/ScheduledCommunicationTime'
        - $ref: '#/components/schemas/NullValue'
    BatteryIndication:
      type: object
      properties:
        batteryInd:
          type: boolean
        replaceableInd:
          type: boolean
        rechargeableInd:
          type: boolean
    BatteryIndicationRm:
      anyOf:
        - $ref: '#/components/schemas/BatteryIndication'
        - $ref: '#/components/schemas/NullValue'
    AcsInfo:
      type: object
      properties:
        acsUrl:
          $ref: '#/components/schemas/Uri'
        acsIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        acsIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
    AcsInfoRm:
      anyOf:
        - $ref: '#/components/schemas/AcsInfo'
        - $ref: '#/components/schemas/NullValue'
    NrV2xAuth:
