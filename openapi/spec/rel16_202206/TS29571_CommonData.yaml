openapi: 3.0.0

info:
  version: '1.2.7'
  title: 'Common Data Types'
  description: |
    Common Data Types for Service Based Interfaces.
    © 2022, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).
    All rights reserved.

externalDocs:
  description: 3GPP TS 29.571 Common Data Types for Service Based Interfaces, version 16.11.0
  url: 'https://www.3gpp.org/ftp/Specs/archive/29_series/29.571/'

paths: {}
components:
  schemas:

# TS29122_CommonData.yaml
    Volume:
      type: integer
      format: int64
      minimum: 0
      description: Unsigned integer identifying a volume in units of bytes.
    VolumeRm:
      type: integer
      format: int64
      minimum: 0
      description: Unsigned integer identifying a volume in units of bytes with "nullable=true" property.
      nullable: true

# TS29502_Nsmf_PDUSession.yaml
    DnnSelectionMode:
      anyOf:
      - type: string
        enum:
          - VERIFIED
          - UE_DNN_NOT_VERIFIED
          - NW_DNN_NOT_VERIFIED
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - VERIFIED
        - UE_DNN_NOT_VERIFIED
        - NW_DNN_NOT_VERIFIED
    VplmnQos:
      type: object
      properties:
        5qi:
          $ref: '#/components/schemas/5Qi'
        arp:
          $ref: '#/components/schemas/Arp'
        sessionAmbr:
          $ref: '#/components/schemas/Ambr'
        maxFbrDl:
          $ref: '#/components/schemas/BitRate'
        maxFbrUl:
          $ref: '#/components/schemas/BitRate'
        guaFbrDl:
          $ref: '#/components/schemas/BitRate'
        guaFbrUl:
          $ref: '#/components/schemas/BitRate'
    EbiArpMapping:
      type: object
      properties:
        epsBearerId:
          $ref: '#/components/schemas/EpsBearerId'
        arp:
          $ref: '#/components/schemas/Arp'
      required:
        - epsBearerId
        - arp
    EpsBearerId:
      type: integer 
      minimum: 0
      maximum: 15
    CnAssistedRanPara:
      type: object
      properties:
        stationaryIndication:
          $ref: '#/components/schemas/StationaryIndication'
        communicationDurationTime:
          $ref: '#/components/schemas/DurationSec'
        periodicTime:
          $ref: '#/components/schemas/DurationSec'
        scheduledCommunicationTime:
          $ref: '#/components/schemas/ScheduledCommunicationTime'
        scheduledCommunicationType:
          $ref: '#/components/schemas/ScheduledCommunicationType'
        trafficProfile:
          $ref: '#/components/schemas/TrafficProfile'
        batteryIndication:
          $ref: '#/components/schemas/BatteryIndication'

# TS29503_Nudm_EE.yaml
    ReferenceId:
      type: integer

# TS29503_Nudm_SDM.yaml
    CagData:
      type: object
      required: 
        - cagInfos
      properties:
        cagInfos:
          description: A map (list of key-value pairs where PlmnId serves as key) of CagInfo
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CagInfo'
        provisioningTime:
          $ref: '#/components/schemas/DateTime'
    CagInfo:
      type: object
      required: 
        - allowedCagList
      properties:
        allowedCagList:
          type: array
          items:
            $ref: '#/components/schemas/CagId'
        cagOnlyIndicator:
          type: boolean
    AppDescriptor:
      type: object
      properties:
        osId:
          $ref: '#/components/schemas/OsId'
        appId:
          type: string
    IpAddress:
      type: object
      oneOf:
        - required:
          - ipv4Addr
        - required:
          - ipv6Addr
        - required:
          - ipv6Prefix
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        ipv6Prefix:
          $ref: '#/components/schemas/Ipv6Prefix'
    EcRestrictionDataWb:
      type: object
      anyOf:
        - required: [ ecModeARestricted ]
        - required: [ ecModeBRestricted ]
      properties:
        ecModeARestricted:
          type: boolean
        ecModeBRestricted:
          type: boolean
    Lpi:
      type: object
      required:
        - locationPrivacyInd
      properties:
        locationPrivacyInd:
          $ref: '#/components/schemas/LocationPrivacyInd'
        validTimePeriod:
          $ref: '#/components/schemas/ValidTimePeriod'
    LocationPrivacyInd:
      anyOf:
        - type: string
          enum:
          - LOCATION_DISALLOWED
          - LOCATION_ALLOWED
        - type: string
    ValidTimePeriod:
      type: object
      properties:
        startTime:
          $ref: '#/components/schemas/DateTime'
        endTime:
          $ref: '#/components/schemas/DateTime'
    SecuredPacket:
      type: string
      format: byte
    ExtGroupId:
      type: string
      pattern: '^extgroupid-[^@]+@[^@]+$'

# TS29503_Nudm_UECM.yaml
    EpsInterworkingInfo:
      type: object
      properties:
        epsIwkPgws:
          description: A map (list of key-value pairs where Dnn serves as key) of EpsIwkPgws
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EpsIwkPgw'
    EpsIwkPgw:
      type: object
      required:
        - pgwFqdn
        - smfInstanceId
      properties:
        pgwFqdn:
          type: string
        smfInstanceId:
          $ref: '#/components/schemas/NfInstanceId'

# TS29507_Npcf_AMPolicyControl.yaml
    SmfSelectionData:
      type: object
      properties:
        unsuppDnn:
          type: boolean
        candidates:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CandidateForReplacement'
          minProperties: 1
          nullable: true
        snssai:
          $ref: '#/components/schemas/Snssai'
        mappingSnssai:
          $ref: '#/components/schemas/Snssai'
        dnn:
          $ref: '#/components/schemas/Dnn'
      nullable: true
    CandidateForReplacement:
      type: object
      properties:
        snssai:
          $ref: '#/components/schemas/Snssai'
        dnns:
          type: array
          items:
            $ref: '#/components/schemas/Dnn'
          minItems: 1
          nullable: true
      required:
        - snssai
      nullable: true

# TS29510_Nnrf_AccessToken.yaml
    AccessTokenErr:
      description: Error returned in the access token response message
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
        error_description:
          type: string
        error_uri:
          type: string
    AccessTokenReq:
      description: Contains information related to the access token request
      type: object
      required:
        - grant_type
        - nfInstanceId
        - scope
      properties:
        grant_type:
          type: string
          enum:
            - client_credentials
        nfInstanceId:
          $ref: '#/components/schemas/NfInstanceId'
        nfType:
          $ref: '#/components/schemas/NFType'
        targetNfType:
          $ref: '#/components/schemas/NFType'
        scope:
          type: string
          pattern: '^([a-zA-Z0-9_:-]+)( [a-zA-Z0-9_:-]+)*$'
        targetNfInstanceId:
          $ref: '#/components/schemas/NfInstanceId'
        requesterPlmn:
          $ref: '#/components/schemas/PlmnId'
        requesterPlmnList:
          type: array
          items:
            $ref: '#/components/schemas/PlmnId'
          minItems: 2
        requesterSnssaiList:
          type: array
          items:
            $ref: '#/components/schemas/Snssai'
          minItems: 1
        requesterFqdn:
          $ref: '#/components/schemas/Fqdn'
        requesterSnpnList:
          type: array
          items:
            $ref: '#/components/schemas/PlmnIdNid'
          minItems: 1
        targetPlmn:
          $ref: '#/components/schemas/PlmnId'
        targetSnssaiList:
          type: array
          items:
            $ref: '#/components/schemas/Snssai'
          minItems: 1
        targetNsiList:
          type: array
          items:
            type: string
          minItems: 1
        targetNfSetId:
          $ref: '#/components/schemas/NfSetId'
        targetNfServiceSetId:
          $ref: '#/components/schemas/NfServiceSetId'
    ServiceName:
      description: Service names known to NRF
      anyOf:
        - type: string
          enum:
            - nnrf-nfm
            - nnrf-disc
            - nnrf-oauth2
            - nudm-sdm
            - nudm-uecm
            - nudm-ueau
            - nudm-ee
            - nudm-pp
            - nudm-niddau
            - nudm-mt
            - namf-comm
            - namf-evts
            - namf-mt
            - namf-loc
            - nsmf-pdusession
            - nsmf-event-exposure
            - nsmf-nidd
            - nausf-auth
            - nausf-sorprotection
            - nausf-upuprotection
            - nnef-pfdmanagement
            - nnef-smcontext
            - nnef-eventexposure
            - 3gpp-cp-parameter-provisioning
            - 3gpp-device-triggering
            - 3gpp-bdt
            - 3gpp-traffic-influence
            - 3gpp-chargeable-party
            - 3gpp-as-session-with-qos
            - 3gpp-msisdn-less-mo-sms
            - 3gpp-service-parameter
            - 3gpp-monitoring-event
            - 3gpp-nidd-configuration-trigger
            - 3gpp-nidd
            - 3gpp-analyticsexposure
            - 3gpp-racs-parameter-provisioning
            - 3gpp-ecr-control
            - 3gpp-applying-bdt-policy
            - 3gpp-mo-lcs-notify
            - npcf-am-policy-control
            - npcf-smpolicycontrol
            - npcf-policyauthorization
            - npcf-bdtpolicycontrol
            - npcf-eventexposure
            - npcf-ue-policy-control
            - nsmsf-sms
            - nnssf-nsselection
            - nnssf-nssaiavailability
            - nudr-dr
            - nudr-group-id-map
            - nlmf-loc
            - n5g-eir-eic
            - nbsf-management
            - nchf-spendinglimitcontrol
            - nchf-convergedcharging
            - nchf-offlineonlycharging
            - nnwdaf-eventssubscription
            - nnwdaf-analyticsinfo
            - ngmlc-loc
            - nucmf-provisioning
            - nucmf-uecapabilitymanagement
            - nhss-sdm
            - nhss-uecm
            - nhss-ueau
            - nhss-ee
            - nhss-ims-sdm
            - nhss-ims-uecm
            - nhss-ims-ueau
            - nsepp-telescopic
            - nsoraf-sor
            - nspaf-secured-packet
            - nudsf-dr
            - nnssaaf-nssaa
        - type: string

# TS29510_Nnrf_NFManagement.yaml
    NFType:
      description: NF types known to NRF
      anyOf:
        - type: string
          enum:
            - NRF
            - UDM
            - AMF
            - SMF
            - AUSF
            - NEF
            - PCF
            - SMSF
            - NSSF
            - UDR
            - LMF
            - GMLC
            - 5G_EIR
            - SEPP
            - UPF
            - N3IWF
            - AF
            - UDSF
            - BSF
            - CHF
            - NWDAF
            - PCSCF
            - CBCF
            - HSS
            - UCMF
            - SOR_AF
            - SPAF
            - MME
            - SCSAS
            - SCEF
            - SCP
            - NSSAAF
            - ICSCF
            - SCSCF
            - DRA
            - IMS_AS
            - CEF
        - type: string
    Fqdn:
      description: Fully Qualified Domain Name
      type: string
    TngfInfo:
      description: Infomation of the TNGF endpoints
      type: object
      properties:
        ipv4EndpointAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4Addr'
          minItems: 1
        ipv6EndpointAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6Addr'
          minItems: 1
        endpointFqdn:
          $ref: '#/components/schemas/Fqdn'
    TwifInfo:
      description: Addressing information (IP addresses, FQDN) of the TWIF
      type: object
      properties:
        ipv4EndpointAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4Addr'
          minItems: 1
        ipv6EndpointAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6Addr'
          minItems: 1
        endpointFqdn:
          $ref: '#/components/schemas/Fqdn'
    WAgfInfo:
      description: Information of the W-AGF end-points
      type: object
      properties:
        ipv4EndpointAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4Addr'
          minItems: 1
        ipv6EndpointAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6Addr'
          minItems: 1
        endpointFqdn:
          $ref: '#/components/schemas/Fqdn'
    NefId:
      description: Identity of the NEF
      type: string

# TS29512_Npcf_SMPolicyControl.yaml
    FlowDescription:
      type: string
      description: Defines a packet filter for an IP flow.
    FlowDirection:
      anyOf:
      - type: string
        enum:
          - DOWNLINK
          - UPLINK
          - BIDIRECTIONAL
          - UNSPECIFIED
      - type: string
        description: >
          This string provides forward-compatibility with future
          extensions to the enumeration but is not used to encode
          content defined in the present version of this API.
      description: >
        Possible values are
        - DOWNLINK: The corresponding filter applies for traffic to the UE.
        - UPLINK: The corresponding filter applies for traffic from the UE.
        - BIDIRECTIONAL: The corresponding filter applies for traffic both to and from the UE.
        - UNSPECIFIED: The corresponding filter applies for traffic to the UE (downlink), but has no specific direction declared. The service data flow detection shall apply the filter for uplink traffic as if the filter was bidirectional. The PCF shall not use the value UNSPECIFIED in filters created by the network in NW-initiated procedures. The PCF shall only include the value UNSPECIFIED in filters in UE-initiated procedures if the same value is received from the SMF.
    ChargingInformation:
      type: object
      properties:
        primaryChfAddress:
          $ref: '#/components/schemas/Uri'
        secondaryChfAddress:
          $ref: '#/components/schemas/Uri'
        primaryChfSetId:
          $ref: '#/components/schemas/NfSetId'
        primaryChfInstanceId:
          $ref: '#/components/schemas/NfInstanceId'
        secondaryChfSetId:
          $ref: '#/components/schemas/NfSetId'
        secondaryChfInstanceId:
          $ref: '#/components/schemas/NfInstanceId'
      required: 
        - primaryChfAddress
        - secondaryChfAddress

# TS29514_Npcf_PolicyAuthorization.yaml
    EthFlowDescription:
      description: Identifies an Ethernet flow
      type: object
      required: 
        - ethType
      properties:
        destMacAddr:
          $ref: '#/components/schemas/MacAddr48'
          ethType:
            type: string
        fDesc:
          $ref: '#/components/schemas/FlowDescription'
        fDir:
          $ref: '#/components/schemas/FlowDirection'
        sourceMacAddr:
          $ref: '#/components/schemas/MacAddr48'
        vlanTags:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 2
        srcMacAddrEnd:
          $ref: '#/components/schemas/MacAddr48'
        destMacAddrEnd:
          $ref: '#/components/schemas/MacAddr48'
    ContentVersion:
      description: Represents the content version of some content.
      type: integer
    AnGwAddress:
      description: describes the address of the access network gateway control node
      type: object
      anyOf:
        - required: [anGwIpv4Addr]
        - required: [anGwIpv6Addr]
      properties: 
        anGwIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        anGwIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
    TscaiInputContainer:
      description: Indicates TSC Traffic pattern.
      type: object
      properties:
        periodicity:
          $ref: '#/components/schemas/Uinteger'
        burstArrivalTime:
          $ref: '#/components/schemas/DateTime'
      nullable: true
    QosNotifType:
      anyOf:
      - type: string
        enum:
          - GUARANTEED          - NOT_GUARANTEED
      - type: string
    FlowStatus:
      anyOf:
      - type: string
        enum:
          - ENABLED-UPLINK
          - ENABLED-DOWNLINK
          - ENABLED
          - DISABLED
          - REMOVED
      - type: string

# TS29518_Namf_Communication.yaml
    N2InfoContent:
      type: object
      properties:
        ngapMessageType:
          $ref: '#/components/schemas/Uinteger'
        ngapIeType:
          $ref: '#/components/schemas/NgapIeType'
        ngapData:
          $ref: '#/components/schemas/RefToBinaryData'
      required:
        - ngapData
    NgapIeType: 
      anyOf:
      - type: string
        enum:
          - PDU_RES_SETUP_REQ
          - PDU_RES_REL_CMD
          - PDU_RES_MOD_REQ
          - HANDOVER_CMD
          - HANDOVER_REQUIRED
          - HANDOVER_PREP_FAIL
          - SRC_TO_TAR_CONTAINER
          - TAR_TO_SRC_CONTAINER
          - TAR_TO_SRC_FAIL_CONTAINER
          - RAN_STATUS_TRANS_CONTAINER
          - SON_CONFIG_TRANSFER
          - NRPPA_PDU
          - UE_RADIO_CAPABILITY
          - RIM_INFO_TRANSFER
          - SECONDARY_RAT_USAGE
          - PC5_QOS_PARA
          - EARLY_STATUS_TRANS_CONTAINER
      - type: string
    N1N2MessageTransferCause:
      anyOf:
      - type: string
        enum:
          - ATTEMPTING_TO_REACH_UE
          - N1_N2_TRANSFER_INITIATED
          - WAITING_FOR_ASYNCHRONOUS_TRANSFER
          - UE_NOT_RESPONDING          - N1_MSG_NOT_TRANSFERRED
          - UE_NOT_REACHABLE_FOR_SESSION
          - TEMPORARY_REJECT_REGISTRATION_ONGOING
          - TEMPORARY_REJECT_HANDOVER_ONGOING
      - type: string
    SbiBindingLevel:
      anyOf:
      - type: string
        enum:
          - NF_INSTANCE_BINDING
          - NF_SET_BINDING
          - NF_SERVICE_SET_BINDING
          - NF_SERVICE_INSTANCE_BINDING
      - type: string
    NgRanTargetId:
      type: object
      properties:
        ranNodeId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        tai:
          $ref: '#/components/schemas/Tai'
      required:
        - ranNodeId
        - tai

# TS29518_Namf_EventExposure.yaml
    CmState:
      anyOf:
      - type: string
        enum:
          - IDLE
          - CONNECTED
      - type: string
    AmfEventSubscription:
      type: object
      properties:
        eventList:
          type: array
          items:
            $ref: '#/components/schemas/AmfEvent'
          minItems: 1
        eventNotifyUri:
          $ref: '#/components/schemas/Uri'
        notifyCorrelationId:
          type: string
        nfId:
          $ref: '#/components/schemas/NfInstanceId'
        subsChangeNotifyUri:
          $ref: '#/components/schemas/Uri'
        subsChangeNotifyCorrelationId:
          type: string
        supi:
          $ref: '#/components/schemas/Supi'
        groupId:
          $ref: '#/components/schemas/GroupId'
        gpsi:
          $ref: '#/components/schemas/Gpsi'
        pei:
          $ref: '#/components/schemas/Pei'
        anyUE:
          type: boolean
        options:
          $ref: '#/components/schemas/AmfEventMode'
        sourceNfType:
          $ref: '#/components/schemas/NFType'
      required:
        - eventList
        - eventNotifyUri
        - notifyCorrelationId
        - nfId
    AmfEvent:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/AmfEventType'
        immediateFlag:
          type: boolean
          default: false
        areaList:
          type: array
          items:
            $ref: '#/components/schemas/AmfEventArea'
          minItems: 1
        locationFilterList:
          type: array
          items:
            $ref: '#/components/schemas/LocationFilter'
          minItems: 1
        refId:
          $ref: '#/components/schemas/ReferenceId'
        trafficDescriptorList:
          type: array
          items:
            $ref: '#/components/schemas/TrafficDescriptor'
          minItems: 1
        reportUeReachable:
          type: boolean
          default: false
        reachabilityFilter:
          $ref: '#/components/schemas/ReachabilityFilter'
        maxReports:
          type: integer
        maxResponseTime:
          $ref: '#/components/schemas/DurationSec'
        idleStatusInd:
          type: boolean
          default: false
      required:
        - type
    AmfEventMode:
      type: object
      properties:
        trigger:
          $ref: '#/components/schemas/AmfEventTrigger'
        maxReports:
          type: integer
        expiry:
          $ref: '#/components/schemas/DateTime'
        repPeriod:
          $ref: '#/components/schemas/DurationSec'
        sampRatio:
          $ref: '#/components/schemas/SamplingRatio'
      required:
        - trigger
    AmfEventType:
      anyOf:
      - type: string
        enum:
          - LOCATION_REPORT
          - PRESENCE_IN_AOI_REPORT
          - TIMEZONE_REPORT
          - ACCESS_TYPE_REPORT
          - REGISTRATION_STATE_REPORT
          - CONNECTIVITY_STATE_REPORT
          - REACHABILITY_REPORT
          - COMMUNICATION_FAILURE_REPORT
          - UES_IN_AREA_REPORT
          - SUBSCRIPTION_ID_CHANGE
          - SUBSCRIPTION_ID_ADDITION
          - LOSS_OF_CONNECTIVITY
          - 5GS_USER_STATE_REPORT
          - AVAILABILITY_AFTER_DDN_FAILURE
          - TYPE_ALLOCATION_CODE_REPORT
          - FREQUENT_MOBILITY_REGISTRATION_REPORT
      - type: string
    AmfEventArea:
      type: object
      properties:
        presenceInfo:
          $ref: '#/components/schemas/PresenceInfo'
        ladnInfo:
          $ref: '#/components/schemas/LadnInfo'
        sNssai:
          $ref: '#/components/schemas/Snssai'
        nsiId:
          $ref: '#/components/schemas/NsiId'
    LocationFilter :
      anyOf:
      - type: string
        enum:
          - TAI 
          - CELL_ID
          - N3IWF
          - UE_IP
          - UDP_PORT
          - TNAP_ID
          - GLI 
          - TWAP_ID
      - type: string
    TrafficDescriptor:
      type: object
      properties:
        dnn:
          $ref: '#/components/schemas/Dnn'
        sNssai: 
          $ref: '#/components/schemas/Snssai'
        dddTrafficDescriptorList:
          type: array
          items:
            $ref: '#/components/schemas/DddTrafficDescriptor'
          minItems: 1
    ReachabilityFilter:
      anyOf:
      - type: string
        enum:
          - UE_REACHABILITY_STATUS_CHANGE
          - UE_REACHABLE_DL_TRAFFIC
      - type: string
    AmfEventTrigger:
      anyOf:
      - type: string
        enum:
          - ONE_TIME
          - CONTINUOUS
          - PERIODIC
      - type: string
    LadnInfo:
      type: object
      properties:
        ladn:
          type: string
        presence:
          $ref: '#/components/schemas/PresenceState'
      required:
        - ladn

# TS29519_Policy_Data.yaml
    IpIndex:
      type: integer
    OsId:
      type: string
      format: uuid

# TS29531_Nnssf_NSSelection.yaml
    MappingOfSnssai:
      type: object
      required:
        - servingSnssai
        - homeSnssai
      properties:
        servingSnssai:
          $ref: '#/components/schemas/Snssai'
        homeSnssai:
          $ref: '#/components/schemas/Snssai'
    NsiId:
      type: string
    AllowedSnssai:
      type: object
      required:
        - allowedSnssai
      properties:
        allowedSnssai:
          $ref: '#/components/schemas/Snssai'
        nsiInformationList:
          type: array
          items:
            $ref: '#/components/schemas/NsiInformation'
          minItems: 1
        mappedHomeSnssai:
          $ref: '#/components/schemas/Snssai'
    AllowedNssai: 
